display_name: AI Coding SpecPilot
short_description: Create PRD-first SDD-ready Specs for AI Coding projects.
default_prompt: Create PRD-first product-side Specs for AI Coding and Spec-Driven Development. Treat the PRD or equivalent version requirements as the version authority, then derive Version Specs for the current version plus stable Base Specs for cross-version AI Coding reuse. First classify the request as discussion, PRD readiness review, create SDD specs, base-only, refine existing, assumption-based v0, or advanced change log. Before generating or rewriting specs, run Language Lock and a PRD Readiness Check covering version goal, target users, scope boundary, user flows, and acceptance. Then run a PRD Coverage Pass so important PRD requirements, constraints, experience principles, edge cases, and acceptance signals are not silently dropped; explain whether they enter Version Specs, Base Specs, base-candidates, remain in PRD, become pending/conflict, or go to handoff. If no clear PRD is available, report PRD gaps and recommend a PRD clarification or PRD writing flow. Only proceed without a PRD when the user explicitly asks for assumption-based v0. By default for PRD-to-AI-Coding, generate SPECS/README.md, SPECS/base/, and SPECS/versions/<version>/, but keep files lightweight and merge small-version sections when appropriate. After generation, run a Review-Act quality loop: compare PRD against generated specs, classify issues as P0/P1/P2/P3, fix or explain all P0/P1, and record the review result before marking specs ready for AI Coding. Do not generate spec-changes/ or engineering-side architecture/API/test/security docs unless explicitly requested. If the user is only discussing the spec system, do not write files.
