display_name: AI Coding SpecPilot
short_description: Create PRD-first product-side Specs for AI Coding projects.
default_prompt: Create lightweight PRD-first product-side Specs for AI Coding projects. Treat the PRD or equivalent version requirements as the version authority, and derive only stable Base Specs that AI Coding agents can read progressively. First classify the request as discussion, PRD readiness review, create from PRD, refine existing, assumption-based v0, legacy version spec, or advanced change log. Before generating or rewriting specs, run Language Lock and a PRD Readiness Check covering version goal, target users, scope boundary, user flows, and acceptance. Then run a lightweight PRD Coverage Pass so important PRD requirements, constraints, experience principles, edge cases, and acceptance signals are not silently dropped; if they do not enter Base Specs, explain whether they are extracted-to-base, kept-in-prd, pending, conflict, or excluded-with-reason. If no clear PRD is available, report PRD gaps and recommend a PRD clarification or PRD writing flow. Only proceed without a PRD when the user explicitly asks for assumption-based v0. By default, generate SPECS/README.md plus 01-08 Base Specs only; do not generate versions/ or spec-changes/ unless explicitly requested. If the user is only discussing the spec system, do not write files.
